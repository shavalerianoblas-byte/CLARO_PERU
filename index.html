<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Modo Claro: Decisiones que Incluyen</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
  <h1>Modo Claro</h1>
  <nav>
    <a href="#">Inicio</a>
    <a href="#">Trivia</a>
    <a href="#">Iniciativas</a>
    <a href="#">Mi Perfil</a>
  </nav>
</header>

<main class="container">

  <!-- TRIVIA -->
  <section class="trivia">
    <h2>Viaje de Empatía</h2>
    <p id="progress"></p>

    <div class="card">
      <h3 id="question"></h3>
      <div id="options"></div>
      <p id="feedback"></p>
    </div>
  </section>

  <!-- PERFIL -->
  <aside class="profile">
    <h2>Tu Perfil DEI</h2>
    <div class="card">
      <p id="profileName">Aliado en crecimiento</p>
      <p>Puntaje: <span id="score">0</span></p>
    </div>
  </aside>

</main>

<!-- INICIATIVAS -->
<section class="initiatives">
  <h2>Iniciativas</h2>
  <div class="cards">
    <div class="card">Taller de Sesgos</div>
    <div class="card">Charla Inclusión</div>
    <div class="card">Programa STEM</div>
  </div>
</section>

<script src="script.js"></script>
</body>
</html>
